<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>
    <style>
      .btn {
        border: 1px solid black;
        padding: 5px;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <h1>Guess a Number</h1>
    <p>Press the following button to start the game</p>
    <input
      type="button"
      class="btn btn-primary"
      id="btn_start_game"
      value="Start Game"
    />
    <p></p>
    <h1>
      After starting a game, enter your guess below and press "Try this guess"
    </h1>
    <input type="text" id="number_guessed" value="0" disabled />
    <input
      type="button"
      class="btn btn-primary"
      id="btn_guess_made"
      value="Try this guess"
      disabled
    />
    <script>
      // Our API address and port goes here. It can be an IP address or DNS name.
      // In this case it is the loopback address.
      var ipAddressAndPort = location.host + ".8080";
      var gameId = 0;
      var guessMade = 0;

      // When you click the object with id #btn_start_game, execute a function that
      // does the following:
      // - Sends a HTTP POST request using the IP address and port with a route of /startGame, passing the game number
      // - Presents an alert with what is returned from the Node.js file (contained in 'data')
      $("btn_start_game").click(function () {
        btn_guess_made.disabled = false;
        number_guessed.disabled = false;
        btn_start_game.disabled = true;
        gameId = Math.floor(Math.random() * 1000000) + 1;
        $.post(
          "http://" + ipAddressAndPort + "/startGame",
          { gameId: gameId },
          function (data) {
            alert(data["APIMessage"]);
          },
        );
      });
    </script>
  </body>
</html>
